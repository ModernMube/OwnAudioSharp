language = "C"
header = "/* Auto-generated by cbindgen — do not edit by hand. */"
include_guard = "OWNAUDIO_FFI_H"
autogen_warning = "/* Warning: this file is auto-generated from Rust source. */"
braces = "SameLine"
line_length = 100
tab_width = 4
documentation = true
usize_is_size_t = true

[export]
include = [
    "OwnAudioErrorCode",
    "OwnAudioSampleFormat",
    "OwnAudioStreamConfig",
    "OwnAudioDeviceInfo",
    "OwnAudioEngineHandle",
    "OwnAudioOutputStreamHandle",
    "OwnAudioInputStreamHandle",
    "OwnAudioOutputCallback",
    "OwnAudioInputCallback",
]

[fn]
must_use = "[[nodiscard]]"
