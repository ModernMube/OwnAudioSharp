language = "C"
header = "/* Auto-generated by cbindgen — do not edit by hand. */"
include_guard = "OWNAUDIO_FFI_H"
autogen_warning = "/* Warning: this file is auto-generated from Rust source. */"
braces = "SameLine"
line_length = 100
tab_width = 4
documentation = true
usize_is_size_t = true

[parse]
# Follow into ownaudio-core so the VST bridge types (VstAudioBuffer, the
# VstProcessFn function pointer) that cross the FFI boundary resolve to real C
# declarations instead of opaque forward-declared structs. Output stays
# reachability-driven, so only types referenced by an `extern "C"` export are
# emitted.
parse_deps = true
include = ["ownaudio-core"]

[export]
include = [
    "OwnAudioErrorCode",
    "OwnAudioSampleFormat",
    "OwnAudioStreamConfig",
    "OwnAudioDeviceInfo",
    "OwnAudioEngineHandle",
    "OwnAudioOutputStreamHandle",
    "OwnAudioInputStreamHandle",
    "OwnAudioOutputCallback",
    "OwnAudioInputCallback",
    "OwnHostApi",
    "VstAudioBuffer",
    "VstProcessFn",
]

[fn]
must_use = "[[nodiscard]]"
