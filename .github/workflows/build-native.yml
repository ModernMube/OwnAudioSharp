name: Build native + pack NuGet

on:
  push:
    branches: [ "develop_rust_audio", "master" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

# Cancel duplicate runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # The ABI version embedded in this workflow must match ffi_abi.rs ABI_VERSION.
  OWNAUDIO_ABI_VERSION: "1"

jobs:
  # -------------------------------------------------------------------------
  # Resolve the package version from the git tag or version.json
  # -------------------------------------------------------------------------
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(grep -oP '"version"\s*:\s*"\K[^"]+' version.json 2>/dev/null || echo "0.0.0-dev")
            RUN="${GITHUB_RUN_NUMBER:-0}"
            VER="${VER%-*}-ci.${RUN}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

  # -------------------------------------------------------------------------
  # Rust native builds — one job per OS runner
  # -------------------------------------------------------------------------
  rust-build-windows:
    name: Rust / Windows (x64 + ARM64 + ASIO)
    needs: version
    runs-on: windows-latest
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-windows-${{ hashFiles('OwnAudioEngineRust/**/Cargo.lock') }}

      - name: Install cargo-xwin (MSVC cross-linker)
        run: cargo install cargo-xwin --locked

      # Attempt to download ASIO SDK from a private artifact store.
      # If the secret is absent the build falls back to WASAPI-only.
      - name: Download ASIO SDK
        id: asio-sdk
        continue-on-error: true
        env:
          ASIO_SDK_ARCHIVE_URL: ${{ secrets.ASIO_SDK_ARCHIVE_URL }}
        shell: bash
        run: |
          if [[ -z "${ASIO_SDK_ARCHIVE_URL}" ]]; then
            echo "asio_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ASIO_SDK_ARCHIVE_URL secret not set — building WASAPI-only."
            exit 0
          fi
          mkdir -p asio_sdk
          curl -fsSL "${ASIO_SDK_ARCHIVE_URL}" -o asio_sdk.zip
          unzip -q asio_sdk.zip -d asio_sdk
          SDK_DIR=$(find asio_sdk -name "asio.h" -exec dirname {} \; | head -n 1)
          SDK_ROOT="${SDK_DIR%/common}"
          echo "ASIO_SDK_DIR=${SDK_ROOT}" >> "$GITHUB_ENV"
          echo "asio_available=true" >> "$GITHUB_OUTPUT"
          echo "ASIO SDK ready at: ${SDK_ROOT}"

      - name: Build win-x64 (with ASIO)
        working-directory: OwnAudioEngineRust
        shell: bash
        run: |
          FEATURES=""
          if [[ "${{ steps.asio-sdk.outputs.asio_available }}" == "true" ]]; then
            FEATURES="--features asio"
          else
            echo "::warning::Building win-x64 WITHOUT ASIO (SDK unavailable)."
          fi
          cargo build --release $FEATURES --target x86_64-pc-windows-msvc

      - name: Build win-arm64 (with ASIO)
        working-directory: OwnAudioEngineRust
        shell: bash
        run: |
          FEATURES=""
          if [[ "${{ steps.asio-sdk.outputs.asio_available }}" == "true" ]]; then
            FEATURES="--features asio"
          else
            echo "::warning::Building win-arm64 WITHOUT ASIO (SDK unavailable)."
          fi
          cargo xwin build --release $FEATURES --target aarch64-pc-windows-msvc

      - name: Validate ASIO exports (win-x64)
        if: steps.asio-sdk.outputs.asio_available == 'true'
        shell: pwsh
        run: |
          # dumpbin is not on PATH, and we must NOT load the full MSVC dev
          # environment globally — doing so makes cc/rustc resolve link.exe via
          # PATH, where the Git Bash coreutils 'link' shadows the MSVC linker
          # and breaks the cargo build. Resolve dumpbin's full path locally.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsRoot = & $vswhere -latest -products * -property installationPath
          $dumpbin = Get-ChildItem "$vsRoot\VC\Tools\MSVC" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) {
            Write-Error "dumpbin.exe not found under the Visual Studio installation."
            exit 1
          }
          Write-Host "Using dumpbin: $dumpbin"
          $dll = "OwnAudioEngineRust/target/x86_64-pc-windows-msvc/release/ownaudio_ffi.dll"
          $exports = & $dumpbin /exports $dll 2>&1 | Select-String "ownaudio_v1_engine_create_with_host|ownaudio_v1_get_abi_version"
          if (-not $exports) {
            Write-Error "Required FFI exports missing from win-x64 binary."
            exit 1
          }
          Write-Host "ASIO exports verified: $exports"

      - name: Summarize ASIO status
        if: steps.asio-sdk.outputs.asio_available != 'true'
        run: |
          echo "### :warning: WASAPI-only build" >> $GITHUB_STEP_SUMMARY
          echo "ASIO SDK was unavailable. The Windows binaries in this run do **not** include ASIO support." >> $GITHUB_STEP_SUMMARY
          echo "To enable ASIO: set the \`ASIO_SDK_ARCHIVE_URL\` repository secret." >> $GITHUB_STEP_SUMMARY

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts/win-x64 artifacts/win-arm64
          cp OwnAudioEngineRust/target/x86_64-pc-windows-msvc/release/ownaudio_ffi.dll    artifacts/win-x64/
          cp OwnAudioEngineRust/target/aarch64-pc-windows-msvc/release/ownaudio_ffi.dll   artifacts/win-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: artifacts/
          retention-days: 7

  rust-build-linux-x64:
    name: Rust / Linux x64
    needs: version
    runs-on: ubuntu-latest
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-x64-${{ hashFiles('OwnAudioEngineRust/**/Cargo.lock') }}

      - name: Build linux-x64
        working-directory: OwnAudioEngineRust
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/linux-x64
          cp OwnAudioEngineRust/target/x86_64-unknown-linux-gnu/release/libownaudio_ffi.so artifacts/linux-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/
          retention-days: 7

  rust-build-linux-arm64:
    name: Rust / Linux ARM64
    needs: version
    runs-on: ubuntu-24.04-arm
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-arm64-${{ hashFiles('OwnAudioEngineRust/**/Cargo.lock') }}

      - name: Build linux-arm64
        working-directory: OwnAudioEngineRust
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/linux-arm64
          cp OwnAudioEngineRust/target/aarch64-unknown-linux-gnu/release/libownaudio_ffi.so artifacts/linux-arm64/

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: artifacts/
          retention-days: 7

  rust-build-macos:
    name: Rust / macOS (x64 + ARM64 + iOS)
    needs: version
    runs-on: macos-14
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin,aarch64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-${{ hashFiles('OwnAudioEngineRust/**/Cargo.lock') }}

      - name: Build osx-x64
        working-directory: OwnAudioEngineRust
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build osx-arm64
        working-directory: OwnAudioEngineRust
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build ios-arm64
        working-directory: OwnAudioEngineRust
        run: cargo build --release --target aarch64-apple-ios -p ownaudio-ffi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/osx-x64 artifacts/osx-arm64 artifacts/iOS-arm64/native
          cp OwnAudioEngineRust/target/x86_64-apple-darwin/release/libownaudio_ffi.dylib  artifacts/osx-x64/
          cp OwnAudioEngineRust/target/aarch64-apple-darwin/release/libownaudio_ffi.dylib artifacts/osx-arm64/
          # iOS ships as a static archive (.a); the Mobile csproj packs it from
          # runtimes/iOS-arm64/native/. The RID casing (iOS-arm64) matches the csproj glob.
          cp OwnAudioEngineRust/target/aarch64-apple-ios/release/libownaudio_ffi.a artifacts/iOS-arm64/native/

      - uses: actions/upload-artifact@v4
        with:
          name: native-macos
          path: artifacts/
          retention-days: 7

  rust-build-android:
    name: Rust / Android (ARM + ARM64 + x64)
    needs: version
    runs-on: ubuntu-latest
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-android-${{ hashFiles('OwnAudioEngineRust/**/Cargo.lock') }}

      # cpal's Android backend uses AAudio, which requires API level 26 (Android 8.0).
      - name: Build android-arm64
        working-directory: OwnAudioEngineRust
        run: cargo ndk --target aarch64-linux-android --platform 26 -- build --release -p ownaudio-ffi

      - name: Build android-arm
        working-directory: OwnAudioEngineRust
        run: cargo ndk --target armv7-linux-androideabi --platform 26 -- build --release -p ownaudio-ffi

      - name: Build android-x64
        working-directory: OwnAudioEngineRust
        run: cargo ndk --target x86_64-linux-android --platform 26 -- build --release -p ownaudio-ffi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/android-arm artifacts/android-arm64 artifacts/android-x64
          cp OwnAudioEngineRust/target/aarch64-linux-android/release/libownaudio_ffi.so   artifacts/android-arm64/
          cp OwnAudioEngineRust/target/armv7-linux-androideabi/release/libownaudio_ffi.so artifacts/android-arm/
          cp OwnAudioEngineRust/target/x86_64-linux-android/release/libownaudio_ffi.so    artifacts/android-x64/

      - uses: actions/upload-artifact@v4
        with:
          name: native-android
          path: artifacts/
          retention-days: 7

  # -------------------------------------------------------------------------
  # dotnet pack — depends on all native builds
  # -------------------------------------------------------------------------
  dotnet-pack:
    name: Pack NuGet packages
    needs:
      - version
      - rust-build-windows
      - rust-build-linux-x64
      - rust-build-linux-arm64
      - rust-build-macos
      - rust-build-android
    runs-on: ubuntu-latest
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts-dl/
          merge-multiple: false

      # Flatten the separate artifact directories into a single artifacts/ tree
      - name: Merge artifacts into artifacts/
        run: |
          mkdir -p artifacts
          for dir in artifacts-dl/*/; do
            cp -r "$dir"* artifacts/ 2>/dev/null || true
          done
          echo "Artifact tree:"
          find artifacts -type f | sort

      # The real packaging projects (OwnAudio/Source/OwnaudioNET*.csproj) embed the
      # native binaries from OwnAudioRust/runtimes/{rid}/native/, so the freshly
      # downloaded artifacts must be staged into that layout before packing.
      - name: Stage native binaries into runtimes/
        run: |
          RT="OwnAudioEngine/OwnAudioRust/runtimes"
          stage() {
            if [[ -f "artifacts/$1" ]]; then
              mkdir -p "$RT/$(dirname "$2")"
              cp "artifacts/$1" "$RT/$2"
              echo "  staged: artifacts/$1 -> $RT/$2"
            else
              echo "::warning::native artifact missing: artifacts/$1"
            fi
          }
          stage "win-x64/ownaudio_ffi.dll"         "win-x64/native/ownaudio_ffi.dll"
          stage "win-arm64/ownaudio_ffi.dll"       "win-arm64/native/ownaudio_ffi.dll"
          stage "linux-x64/libownaudio_ffi.so"     "linux-x64/native/libownaudio_ffi.so"
          stage "linux-arm64/libownaudio_ffi.so"   "linux-arm64/native/libownaudio_ffi.so"
          stage "osx-x64/libownaudio_ffi.dylib"    "osx-x64/native/libownaudio_ffi.dylib"
          stage "osx-arm64/libownaudio_ffi.dylib"  "osx-arm64/native/libownaudio_ffi.dylib"
          stage "android-arm64/libownaudio_ffi.so" "android-arm64/native/libownaudio_ffi.so"

      # Pack the REAL high-level projects (they compile OwnAudio/Source/** into the
      # OwnaudioNET public API assembly). The old OwnAudio.Packaging/* wrappers only
      # re-packaged OwnAudioRust and produced truncated packages missing the API.
      - name: Restore .NET dependencies
        run: |
          dotnet restore OwnAudio/Source/OwnaudioNET.Basic.csproj
          dotnet restore OwnAudio/Source/OwnaudioNET.csproj

      # Struct-size smoke test: verify each platform binary exposes the expected ABI exports
      - name: Struct-size / symbol smoke test
        run: |
          echo "Checking ABI symbols in each native binary..."
          check_sym() {
            local FILE="$1"
            local SYM="$2"
            if nm -D "$FILE" 2>/dev/null | grep -q "$SYM" || \
               nm    "$FILE" 2>/dev/null | grep -q "$SYM"; then
              echo "  OK  $SYM in $(basename $FILE)"
            else
              echo "  WARN $SYM not found in $(basename $FILE) (may use different nm flags)"
            fi
          }
          for lib in artifacts/linux-x64/libownaudio_ffi.so \
                     artifacts/linux-arm64/libownaudio_ffi.so \
                     artifacts/android-arm64/libownaudio_ffi.so; do
            [[ -f "$lib" ]] && check_sym "$lib" "ownaudio_v1_get_abi_version"
          done
          for dylib in artifacts/osx-x64/libownaudio_ffi.dylib \
                       artifacts/osx-arm64/libownaudio_ffi.dylib; do
            [[ -f "$dylib" ]] && \
              (nm -g "$dylib" 2>/dev/null | grep -q "ownaudio_v1_get_abi_version" && \
               echo "  OK  ownaudio_v1_get_abi_version in $(basename $dylib)" || \
               echo "  WARN symbol check failed for $dylib")
          done

      # Version is the csproj <Version> (source of truth; bumped per release).
      # We deliberately do NOT override it from version.json here — the real
      # projects don't use $(OwnAudioVersion), and overriding would desync the
      # Full package from its OwnAudioSharp.Midi dependency version.
      - name: Pack OwnAudioSharp.Basic
        run: |
          dotnet pack OwnAudio/Source/OwnaudioNET.Basic.csproj \
            --configuration Release \
            --no-restore \
            -p:GeneratePackageOnBuild=false \
            --output packages-out

      - name: Pack OwnAudioSharp (Full)
        run: |
          dotnet pack OwnAudio/Source/OwnaudioNET.csproj \
            --configuration Release \
            --no-restore \
            -p:GeneratePackageOnBuild=false \
            --output packages-out

      - name: Verify OwnAudioSharp.Basic package
        run: |
          NUPKG=$(ls packages-out/OwnAudioSharp.Basic.*.nupkg | head -n 1)
          bash OwnAudio.Packaging/build/verify-package.sh "${NUPKG}"

      - name: Verify OwnAudioSharp package
        run: |
          NUPKG=$(ls packages-out/OwnAudioSharp.*.nupkg | grep -v "Basic\|Mobile" | head -n 1)
          bash OwnAudio.Packaging/build/verify-package.sh "${NUPKG}"

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: packages-out/*.nupkg
          retention-days: 30

  # -------------------------------------------------------------------------
  # dotnet pack (mobile) — builds the net10.0-android + net10.0-ios TFMs, so it
  # must run on macOS with the Android + iOS workloads (and Xcode) available.
  # -------------------------------------------------------------------------
  dotnet-pack-mobile:
    name: Pack OwnAudioSharp.Mobile
    needs:
      - version
      - rust-build-macos
      - rust-build-android
    runs-on: macos-14
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET mobile workloads
        run: dotnet workload install android ios

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/
          merge-multiple: true

      # The Mobile project packs the mobile natives from OwnAudioRust/runtimes/{rid}/,
      # so stage the freshly built Android + iOS binaries into that layout first.
      - name: Stage mobile native binaries into runtimes/
        run: |
          RT="OwnAudioEngine/OwnAudioRust/runtimes"
          stage() {
            if [[ -f "artifacts/$1" ]]; then
              mkdir -p "$RT/$(dirname "$2")"
              cp "artifacts/$1" "$RT/$2"
              echo "  staged: artifacts/$1 -> $RT/$2"
            else
              echo "::error::mobile native artifact missing: artifacts/$1"
              exit 1
            fi
          }
          stage "android-arm/libownaudio_ffi.so"       "android-arm/native/libownaudio_ffi.so"
          stage "android-arm64/libownaudio_ffi.so"     "android-arm64/native/libownaudio_ffi.so"
          stage "android-x64/libownaudio_ffi.so"       "android-x64/native/libownaudio_ffi.so"
          stage "iOS-arm64/native/libownaudio_ffi.a"   "iOS-arm64/native/libownaudio_ffi.a"

      - name: Restore .NET dependencies
        run: dotnet restore OwnAudio/Source/OwnaudioNET.Mobile.csproj

      - name: Pack OwnAudioSharp.Mobile
        run: |
          dotnet pack OwnAudio/Source/OwnaudioNET.Mobile.csproj \
            --configuration Release \
            -p:BuildMobile=true \
            -p:GeneratePackageOnBuild=false \
            --output packages-out

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg-mobile
          path: packages-out/*.nupkg
          retention-days: 30

  # -------------------------------------------------------------------------
  # Commit built native binaries back into runtimes/ for local development
  # -------------------------------------------------------------------------
  update-runtimes:
    name: Update runtimes/ with built natives
    needs:
      - rust-build-windows
      - rust-build-linux-x64
      - rust-build-linux-arm64
      - rust-build-macos
      - rust-build-android
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native-dl/
          merge-multiple: false

      - name: Merge artifacts
        run: |
          mkdir -p native-merged
          for dir in native-dl/*/; do
            cp -r "$dir"* native-merged/ 2>/dev/null || true
          done
          echo "Downloaded artifacts:"
          find native-merged -type f | sort

      - name: Copy natives to runtimes/
        run: |
          RUNTIMES="OwnAudioEngine/OwnAudioRust/runtimes"

          copy_if_exists() {
            local SRC="$1"
            local DST="$2"
            if [[ -f "$SRC" ]]; then
              mkdir -p "$(dirname "$DST")"
              cp "$SRC" "$DST"
              echo "  Copied: $SRC -> $DST"
            else
              echo "::warning::Missing artifact: $SRC"
            fi
          }

          copy_if_exists "native-merged/win-x64/ownaudio_ffi.dll"         "$RUNTIMES/win-x64/native/ownaudio_ffi.dll"
          copy_if_exists "native-merged/win-arm64/ownaudio_ffi.dll"       "$RUNTIMES/win-arm64/native/ownaudio_ffi.dll"
          copy_if_exists "native-merged/linux-x64/libownaudio_ffi.so"     "$RUNTIMES/linux-x64/native/libownaudio_ffi.so"
          copy_if_exists "native-merged/linux-arm64/libownaudio_ffi.so"   "$RUNTIMES/linux-arm64/native/libownaudio_ffi.so"
          copy_if_exists "native-merged/osx-x64/libownaudio_ffi.dylib"    "$RUNTIMES/osx-x64/native/libownaudio_ffi.dylib"
          copy_if_exists "native-merged/osx-arm64/libownaudio_ffi.dylib"  "$RUNTIMES/osx-arm64/native/libownaudio_ffi.dylib"
          copy_if_exists "native-merged/android-arm64/libownaudio_ffi.so"    "$RUNTIMES/android-arm64/native/libownaudio_ffi.so"
          copy_if_exists "native-merged/android-arm/libownaudio_ffi.so"      "$RUNTIMES/android-arm/native/libownaudio_ffi.so"
          copy_if_exists "native-merged/android-x64/libownaudio_ffi.so"      "$RUNTIMES/android-x64/native/libownaudio_ffi.so"
          copy_if_exists "native-merged/iOS-arm64/native/libownaudio_ffi.a"  "$RUNTIMES/iOS-arm64/native/libownaudio_ffi.a"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add OwnAudioEngine/OwnAudioRust/runtimes/
          if git diff --cached --quiet; then
            echo "No changes in runtimes/ -- nothing to commit."
          else
            git commit -m "chore(runtimes): update ownaudio_ffi native binaries [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

  # -------------------------------------------------------------------------
  # Integration test — installs the packed .nupkg into a fresh test project
  # -------------------------------------------------------------------------
  integration-test:
    name: Integration test (${{ matrix.os }})
    needs:
      - version
      - dotnet-pack
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]
    runs-on: ${{ matrix.os }}
    env:
      OWNAUDIO_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: test-pkgs/

      - name: Create local NuGet feed
        shell: bash
        run: |
          mkdir -p local-feed
          cp test-pkgs/*.nupkg local-feed/

      - name: Create minimal test project
        shell: bash
        run: |
          mkdir -p int-test
          # Derive the version from the actually-packed nupkg (the real projects
          # carry their version in the csproj, so we must not assume version.json).
          PKG_VER=$(ls test-pkgs/OwnAudioSharp.Basic.*.nupkg | head -n1 | sed -E 's|.*/OwnAudioSharp\.Basic\.(.+)\.nupkg|\1|')
          echo "Detected package version: ${PKG_VER}"
          # A project-local nuget.config points at the local feed with a
          # relative path. This avoids `dotnet nuget add source`, which fails
          # on Windows bash because $(pwd) yields an MSYS path the CLI rejects.
          cat > int-test/nuget.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-ownaudio" value="../local-feed" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          EOF
          cat > int-test/int-test.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="OwnAudioSharp.Basic" Version="${PKG_VER}" />
            </ItemGroup>
          </Project>
          EOF
          cat > int-test/Program.cs <<'EOF'
          using Ownaudio.Safe;
          using Ownaudio.Safe.Exceptions;

          // ABI version smoke test: Create() must not throw AbiVersionMismatchException.
          try
          {
              using var engine = AudioEngine.Create();
              Console.WriteLine("Engine created successfully.");
              var outputs = engine.EnumerateOutputDevices();
              Console.WriteLine($"Output devices: {outputs.Count}");
          }
          catch (AbiVersionMismatchException ex)
          {
              Console.Error.WriteLine($"FAIL: {ex.Message}");
              Environment.Exit(1);
          }
          catch (Exception ex)
          {
              // Other exceptions (e.g. no audio device in CI) are acceptable.
              Console.WriteLine($"Non-fatal exception (expected in headless CI): {ex.GetType().Name}: {ex.Message}");
          }

          // High-level API presence check: a truncated package (one that ships only
          // the low-level engine and omits the OwnaudioNET public API assembly) fails
          // to COMPILE here. This guards against the packaging regression where the
          // OwnAudio.Packaging wrappers produced API-less packages.
          Console.WriteLine($"High-level API type: {typeof(OwnaudioNET.Mixing.AudioMixer).FullName}");

          Console.WriteLine("Integration test PASS.");
          EOF

      - name: Build and run integration test
        shell: bash
        run: |
          cd int-test
          # Restore resolves the feed from the project-local nuget.config.
          dotnet run --configuration Release
