name: Build OwnAudio.ML Native + NuGet

on:
  push:
    branches: [ master, "develop/**" ]
    paths:
      - 'native/ownaudio_ml/**'
      - 'OwnAudio/ML/**'
      - '.github/workflows/build-ml.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'native/ownaudio_ml/**'
      - 'OwnAudio/ML/**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  ONNXRUNTIME_VERSION: "1.26.0"

jobs:
  # ============================================================
  # Build native ownaudio_ml library for every supported platform
  # ============================================================
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            rid: win-x64
            lib_name: ownaudio_ml.dll
            cmake_args: -A x64

          # Windows ARM64
          - os: windows-latest
            rid: win-arm64
            lib_name: ownaudio_ml.dll
            cmake_args: -A ARM64

          # macOS Universal (x86_64 + arm64 in one fat binary)
          - os: macos-latest
            rid: osx-universal
            lib_name: libownaudio_ml.dylib
            cmake_args: -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

          # Linux x64
          - os: ubuntu-latest
            rid: linux-x64
            lib_name: libownaudio_ml.so
            cmake_args: ""

          # Linux ARM64 (cross-compile from ubuntu-latest)
          - os: ubuntu-latest
            rid: linux-arm64
            lib_name: libownaudio_ml.so
            cmake_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

    runs-on: ${{ matrix.os }}
    name: Native – ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux dependencies ────────────────────────────────────
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install Linux ARM64 cross-compiler
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # ── Configure & Build ─────────────────────────────────────
      - name: Configure CMake
        working-directory: native/ownaudio_ml
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.cmake_args }}

      - name: Build
        working-directory: native/ownaudio_ml
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # ── Collect artifact ──────────────────────────────────────
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $lib = Get-ChildItem -Path "native/ownaudio_ml/build" -Recurse -Filter "${{ matrix.lib_name }}" | Select-Object -First 1
          if ($lib) {
            New-Item -ItemType Directory -Force -Path "artifacts/${{ matrix.rid }}"
            Copy-Item $lib.FullName "artifacts/${{ matrix.rid }}/${{ matrix.lib_name }}"
          } else {
            Write-Error "Library ${{ matrix.lib_name }} not found!"
            exit 1
          }

      - name: Collect artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/${{ matrix.rid }}
          find native/ownaudio_ml/build -name "${{ matrix.lib_name }}" -exec cp {} artifacts/${{ matrix.rid }}/ \;
          ls -lh artifacts/${{ matrix.rid }}/

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/
          retention-days: 30

  # ============================================================
  # Commit built native libraries into OwnAudio/ML/runtimes/
  # (only on push, skipped when the commit itself is a [skip ci])
  # ============================================================
  update-native-libs:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-native
    runs-on: ubuntu-latest
    name: Commit Native Libraries
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # Download every platform artifact
      - name: Download win-x64
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: OwnAudio/ML/runtimes/win-x64/native/

      - name: Download win-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-win-arm64
          path: OwnAudio/ML/runtimes/win-arm64/native/
        continue-on-error: true

      - name: Download osx-universal
        uses: actions/download-artifact@v4
        with:
          name: native-osx-universal
          path: OwnAudio/ML/runtimes/osx/native/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: OwnAudio/ML/runtimes/linux-x64/native/

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: OwnAudio/ML/runtimes/linux-arm64/native/
        continue-on-error: true

      # macOS universal → both arch-specific folders
      - name: Expand macOS universal to arch folders
        run: |
          mkdir -p OwnAudio/ML/runtimes/osx-x64/native/
          mkdir -p OwnAudio/ML/runtimes/osx-arm64/native/
          cp OwnAudio/ML/runtimes/osx/native/* OwnAudio/ML/runtimes/osx-x64/native/   || true
          cp OwnAudio/ML/runtimes/osx/native/* OwnAudio/ML/runtimes/osx-arm64/native/ || true

      - name: Commit native libraries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add OwnAudio/ML/runtimes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ownaudio_ml native libraries [skip ci]"
            git push
          fi

  # ============================================================
  # Build OwnAudio.ML C# project and pack NuGet
  # ============================================================
  build-nuget:
    needs: [ build-native, update-native-libs ]
    if: always() && needs.build-native.result == 'success'
    runs-on: ubuntu-latest
    name: Build & Pack NuGet

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Pull the runtimes/ committed by update-native-libs
      - name: Pull latest native libraries
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
        run: git pull origin ${{ github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Fallback: download artifacts if runtimes/ not yet committed
      - name: Download win-x64 (fallback)
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: OwnAudio/ML/runtimes/win-x64/native/
        continue-on-error: true

      - name: Download osx-universal (fallback)
        uses: actions/download-artifact@v4
        with:
          name: native-osx-universal
          path: OwnAudio/ML/runtimes/osx/native/
        continue-on-error: true

      - name: Download linux-x64 (fallback)
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: OwnAudio/ML/runtimes/linux-x64/native/
        continue-on-error: true

      - name: Expand macOS universal (fallback)
        run: |
          mkdir -p OwnAudio/ML/runtimes/osx-x64/native/
          mkdir -p OwnAudio/ML/runtimes/osx-arm64/native/
          cp OwnAudio/ML/runtimes/osx/native/* OwnAudio/ML/runtimes/osx-x64/native/   || true
          cp OwnAudio/ML/runtimes/osx/native/* OwnAudio/ML/runtimes/osx-arm64/native/ || true

      - name: Restore
        run: dotnet restore OwnAudio/ML/OwnAudio.ML.csproj

      - name: Build
        run: dotnet build OwnAudio/ML/OwnAudio.ML.csproj --configuration Release --no-restore

      - name: Pack NuGet
        run: dotnet pack OwnAudio/ML/OwnAudio.ML.csproj --configuration Release --no-build -o packages/

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: OwnAudioSharp-ML-NuGet
          path: packages/*.nupkg
          retention-days: 30

  # ============================================================
  # Create GitHub Release (on version tag push: v*)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-native, build-nuget ]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release archives
        run: |
          cd release-artifacts

          # Bundle all native libs
          mkdir -p native-all
          for dir in native-*/; do
            rid=$(echo "$dir" | sed 's/native-//' | tr -d '/')
            mkdir -p "native-all/runtimes/$rid/native"
            cp -r "$dir"* "native-all/runtimes/$rid/native/" || true
          done
          cd native-all && zip -r ../ownaudio-ml-native-all.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/ownaudio-ml-native-all.zip
            release-artifacts/OwnAudioSharp-ML-NuGet/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
