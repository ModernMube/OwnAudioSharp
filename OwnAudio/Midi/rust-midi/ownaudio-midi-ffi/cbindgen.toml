language = "C"
header = "/* Auto-generated by cbindgen — do not edit by hand. */"
include_guard = "OWNAUDIO_MIDI_FFI_H"
autogen_warning = "/* Warning: this file is auto-generated from Rust source. */"
braces = "SameLine"
line_length = 100
tab_width = 4
documentation = true
usize_is_size_t = true

[export]
include = [
    "MidiErrorCode",
    "NativeMidiMessage",
    "NativeMidiEvent",
    "MidiInputPortHandle",
    "MidiOutputPortHandle",
    "MidiClockHandle",
    "MidiFileHandle",
    "MidiWriterHandle",
]

[fn]
must_use = "[[nodiscard]]"
